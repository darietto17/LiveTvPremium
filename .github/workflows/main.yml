name: RUN SCRIPT LISTA
on:
  push:
    branches: [ main, master ]
    paths:
      - 'scripts/lista.py'
  schedule:
    - cron: '0 */2 * * *'  # Esegui ogni 2 ore
  workflow_dispatch:  # Consente l'esecuzione manuale

jobs:
  extract-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessario per il commit
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright bs4 rapidfuzz fuzzywuzzy python-Levenshtein python-dateutil python-dotenv pillow
          playwright install 

      - name: Run Script
        run: |
          python scripts/lista.py
      
      - name: Gzip list and EPG
        run: |
          gzip -c lista.m3u > lista.m3u.gz
          if [ -f epg.xml ]; then gzip -c epg.xml > epg.xml.gz; fi

      - name: Pull latest changes
        run: |
          git config pull.rebase false
          git pull origin master
      
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 Update list (compressed) - ${{ github.run_number }}"
          file_pattern: "lista.m3u lista.m3u.gz epg.xml epg.xml.gz"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
